name: release

on:
  workflow_dispatch:
  push:
    branches:
      - dba/informix_csdk

jobs:
  linux:
    runs-on: ${{ matrix.platform.runs-on }}
    container: quay.io/pypa/manylinux_2_34_${{ matrix.platform.arch }}
    strategy:
      matrix:
        platform:
          [
            { "arch": "x86_64", "runs-on": "ubuntu-latest" },
          ]
        python-version:
          [[313, "3.13"]]
    steps:
      - uses: actions/checkout@v6

      - name: Set python version
        run: |
          echo "/opt/python/cp${{ matrix.python-version[0] }}-cp${{ matrix.python-version[0] }}/bin" >> $GITHUB_PATH

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          target: aarch64-unknown-linux-gnu
          default: true

      - uses: extractions/setup-just@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: Gr1N/setup-poetry@v9

      - name: Install tools
        run: |
          yum install -y epel-release
          yum install -y mysql-devel postgresql-devel freetds-devel krb5-libs clang-devel libffi-devel

      - name: Setup project
        run: |
          just bootstrap-python

      - name: Download IBM DB2 CLI Driver for Informix
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          IBM_CDN="https://public.dhe.ibm.com/ibmdl/export/pub/software/data/db2/drivers/odbc_cli"
          FILE="linuxx64_odbc_cli.tar.gz"
          EXTRACT_DIR=".libdb2-x86_64"

          mkdir -p "${EXTRACT_DIR}"
          cd "${EXTRACT_DIR}"

          curl -fSL "${IBM_CDN}/${FILE}" -o "${FILE}"
          tar -xzf "${FILE}"
          rm -f "${FILE}"

          if [[ -f "clidriver/lib/libdb2.so" ]]; then
            echo "IBM_DB_HOME=${GITHUB_WORKSPACE}/${EXTRACT_DIR}/clidriver" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ -f "clidriver-full/lib/libdb2.so" ]]; then
            echo "IBM_DB_HOME=${GITHUB_WORKSPACE}/${EXTRACT_DIR}/clidriver-full" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "ERROR: libdb2.so not found after extraction" >&2
          find . -maxdepth 3 -type f -name 'libdb2.so*' -print || true
          exit 1
        shell: bash

      - uses: PyO3/maturin-action@v1
        with:
          rust-toolchain: stable
          command: build
          args: -m connectorx-python/Cargo.toml -i python --release --manylinux 2_34 --features integrated-auth-gssapi
          before-script-linux: |
            # If we're running on rhel centos, install needed packages.
            if command -v yum &> /dev/null; then
                yum update -y && yum install -y perl-core openssl openssl-devel pkgconfig libatomic

                # If we're running on i686 we need to symlink libatomic
                # in order to build openssl with -latomic flag.
                if [[ ! -d "/usr/lib64" ]]; then
                    ln -s /usr/lib/libatomic.so.1 /usr/lib/libatomic.so
                fi
            else
                # If we're running on debian-based system.
                apt update -y && apt-get install -y libssl-dev openssl pkg-config
            fi
        env:
          SQLITE3_STATIC: 1
          IFX_CLIENT_LIB: db2
          IBM_DB_HOME: ${{ env.IBM_DB_HOME }}
          LD_LIBRARY_PATH: ${{ env.IBM_DB_HOME }}/lib

      - uses: actions/upload-artifact@v7
        with:
          name: "linux-${{matrix.platform.arch}}-${{ matrix.python-version[1] }}"
          path: connectorx-python/target/wheels/*.whl

  verify:
    runs-on: ${{ matrix.os }}
    needs: [linux]
    strategy:
      matrix:
        python-version: ["3.13"]
        os:
          [
            ubuntu-latest,
          ]
        include:
          # override artifact-prefix for linux variants
          - os: "ubuntu-latest"
            artifact-prefix: "linux-x86_64"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v8
        with:
          name: "${{ matrix.artifact-prefix || matrix.os }}-${{ matrix.python-version }}"

      - run: |
          pip install *.whl
          python -c "import connectorx"
