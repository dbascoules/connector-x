name: ci

on:
  pull_request:
    branches:
      - main
      - prerelease
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl postgresql-client build-essential pkg-config libssl-dev git sqlite3 libsqlite3-dev mysql-client python3 python3-pip libkrb5-dev libclang-dev
          echo "Cache Version ${{ secrets.CACHE_VERSION }}"
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          default: true

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ secrets.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - uses: extractions/setup-just@v4

      - name: Is the code formatted?
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check -q

      - name: Clippy linting
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --features all

      # - name: Check each feature gate
      #   run: just test-feature-gate

      - name: Run tests
        run: cargo clean && just test-ci

      - name: Test build docs
        uses: actions-rs/cargo@v1
        with:
          command: doc
          args: --no-deps --features all

  python:
    runs-on: ubuntu-latest
    # Note: No 'container' - we run directly on the VM to access Docker for Testcontainers
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
            python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl postgresql-client build-essential pkg-config libssl-dev git sqlite3 libsqlite3-dev mysql-client libmysqlclient-dev libkrb5-dev libclang-dev libffi-dev libaio1t64
          
          # Create symlink for libaio.so.1 (Oracle expects libaio.so.1, but Ubuntu 24.04 provides libaio.so.1t64)
          sudo ln -sf /lib/x86_64-linux-gnu/libaio.so.1t64 /lib/x86_64-linux-gnu/libaio.so.1

      - name: Install Oracle Instant Client
        run: |
          # Download Oracle Instant Client
          mkdir -p /opt/oracle
          cd /opt/oracle
          wget https://download.oracle.com/otn_software/linux/instantclient/2340000/instantclient-basic-linux.x64-23.4.0.24.05.zip
          wget https://download.oracle.com/otn_software/linux/instantclient/2340000/instantclient-sdk-linux.x64-23.4.0.24.05.zip
          
          # Unzip
          sudo unzip -o instantclient-basic-linux.x64-23.4.0.24.05.zip -d /opt/oracle
          sudo unzip -o instantclient-sdk-linux.x64-23.4.0.24.05.zip -d /opt/oracle
          
          # Set environment variables
          echo "LD_LIBRARY_PATH=/opt/oracle/instantclient_23_4:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "/opt/oracle/instantclient_23_4" >> $GITHUB_PATH

      - name: Verify Docker access for Testcontainers
        run: |
          docker --version
          docker ps

      - uses: Gr1N/setup-poetry@v9

      - uses: extractions/setup-just@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          default: true

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-python-${{ matrix.python-version }}-${{ secrets.CACHE_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy linting
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --features all --all

      - name: Cache venv
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-${{ matrix.python-version }}-venv-${{ secrets.CACHE_VERSION }}-${{ hashFiles('connectorx-python/poetry.lock') }}

      - name: Install python dependencies
        run: just bootstrap-python

      - name: Download IBM DB2 CLI Driver for Informix
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          OS="$(uname -s)"
          ARCH="$(uname -m)"
          IBM_CDN="https://public.dhe.ibm.com/ibmdl/export/pub/software/data/db2/drivers/odbc_cli"

          case "$OS" in
              Linux)
                  if [[ "$ARCH" == "aarch64" ]]; then
                      FILE="linuxx64_odbc_cli.tar.gz"
                      EXTRACT_DIR=".libdb2-aarch64"
                  else
                      FILE="linuxx64_odbc_cli.tar.gz"
                      EXTRACT_DIR=".libdb2-x86_64"
                  fi
                  LIB_SUBDIR="clidriver-full/lib"
                  LIB_NAME="libdb2.so"
                  ;;
              *)
                  echo "Skipping IBM CLI Driver download for $OS"
                  exit 0
                  ;;
          esac

          EXTRACT_PATH="${EXTRACT_DIR}"
          LIB_PATH="${EXTRACT_PATH}/${LIB_SUBDIR}/${LIB_NAME}"

          if [[ -f "$LIB_PATH" ]]; then
              echo "✓ IBM CLI Driver already present: $LIB_PATH"
              exit 0
          fi

          echo "📥 Downloading IBM DB2 CLI Driver: $FILE ($OS $ARCH)"
          mkdir -p "$EXTRACT_PATH"
          cd "$EXTRACT_PATH"

          if curl -fSL "${IBM_CDN}/${FILE}" -o "${FILE}"; then
              echo "✓ Download completed"
              echo "📦 Extracting TAR.GZ..."
              tar -xzf "${FILE}"
              rm "${FILE}"
              echo "✓ Extraction completed"
              echo "  Library: $LIB_PATH"
          else
              echo "ERROR: Failed to download $FILE from $IBM_CDN" >&2
              exit 1
          fi
        shell: bash

      - name: Test python
        run: just test-python
        # Integration tests provision required services at test time via Testcontainers

      - name: Test Informix connector
        run: just test-python-informix
        # Testcontainers provisions Informix container at test time if INFORMIX_URL is not set
